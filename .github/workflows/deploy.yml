yaml
name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Copy project files to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude '__pycache__' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude 'staticfiles' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}

      - name: Install system dependencies on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            sudo apt update 
            sudo apt install -y gcc libpq-dev python3-dev postgresql-server-dev-all
            echo "✅ System dependencies installed"
          EOF

      - name: Install dependencies and migrate
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            
            if [ ! -d "venv" ]; then
              /usr/bin/python3 -m venv venv
            fi
            
            ./venv/bin/pip install --upgrade pip
            
            # Устанавливаем Django первым
            ./venv/bin/pip install Django==6.0.1
            
            # Устанавливаем всё остальное
            ./venv/bin/pip install -r requirements.txt
            
            # Проверка
            ./venv/bin/python -c "import django; print(f'Django {django.__version__} OK')"
            
            ./venv/bin/python manage.py migrate --noinput
            ./venv/bin/python manage.py collectstatic --noinput
            
            echo "✅ Dependencies installed and migrations applied"
          EOF

      - name: Restart application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            
            pkill -f "gunicorn" || true
            
            ./venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:8000 --daemon
            
            echo "✅ Application restarted"
          EOF
