name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install flake8 mypy black isort
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy isort black

      - name: Run lints
        run: |
          flake8 . --max-line-length=120 --exclude=migrations,venv,__pycache__
          mypy .
          isort .
          black .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: online_store_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          POSTGRES_DB: online_store_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
        run: python manage.py migrate && python manage.py test --noinput

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:latest
          
            
            docker stop online_store_web online_store_db online_store_redis|| true
            docker rm online_store_web online_store_db online_store_redis || true
          
            docker run -d \
              --name online_store_db \
              --network online_store_network \
              -v online_store_test_postgres_data:/var/lib/postgresql/data \
              -e POSTGRES_DB=online_store \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=postgres123456 \
              postgres:16
          
            docker run -d \
              --name online_store_redis \
              --network online_store_network \
              -v online_store_test_redis_data:/data \
              redis:7
          
            docker run -d \
              --name online_store_web \
              --network online_store_network \
              -p 8000:8000 \
              -v online_store_test_static_volume:/app/staticfiles \
              -v online_store_test_media_volume:/app/media \
              --env-file /home/${{ secrets.SSH_USER }}/online_store_test/.env \
              ${{ secrets.DOCKER_HUB_USERNAME }}/online-store:latest
          
            echo "✅ Deployed successfully!"
          EOF
      
      
